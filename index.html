<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カラーレンズLPポートフォリオ</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      background:#b0d0e5;
      font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    }
    .wrapper{
      width:100%;
      max-width:430px;
      margin:0 auto;
      background:#fff;
      overflow:hidden;
    }
    img{
      display:block;
      width:100%;
      height:auto;
    }
    .sticky-header{
      position:sticky;
      top:0;
      z-index:100;
      background:#fff;
    }

    .type-grid-section{
      padding:12px 16px 24px;
      background:#fff;
    }
    .type-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }
    .type-grid img{
      border-radius:4px;
    }

    .type-block{
      position:relative;
    }

.report-base{
  position:relative;
}

.report-base > img{
  display:block;
  width:100%;
  height:auto;
}

.report-slider{
  position:absolute;
  left:50%;
  top:900px;
  width:70%;
  overflow:hidden;
  z-index:2;
  transform:translateX(-50%);
}

.report-track{
  display:flex;
  width:100%;
  transition:transform .35s ease;
  will-change:transform;
}

.report-slide{
  flex:0 0 100%;
  width:100%;
  aspect-ratio:1/1;
  overflow:hidden;
}

.report-slide img{
  display:block;
  width:90%;
  height:90%;
  object-fit:cover;
}

.report-dots{
  position:relative;
  z-index:3;
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:6px;
}

.report-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  border:none;
  background:rgba(80,80,80,.28);
  padding:0;
  cursor:pointer;
}

.report-dot.active{
  background:rgba(80,80,80,.92);
}
    
.banner-spacing{
 margin-bottom:32px;
 }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="sticky-header">
    <img src="new@3x.png" alt="ヘッダー">
  </div>

  <img src="01_TOP@3x.png" alt="">
  <img src="02_sindan@3x.png" alt="">

  <section class="type-grid-section">
    <div class="type-grid">
      <img src="03_kankoku@3x.png" alt="">
      <img src="04_girl@3x.png" alt="">
      <img src="05_amame@3x.png" alt="">
      <img src="06_hakanage@3x.png" alt="">
    </div>
  </section>

  <!-- TYPE1 -->
  <div class="type-block">
    <img src="07_type1@3x.png" alt="">
    <div class="report-base">
      <img src="08_type1@3x.png" alt="">
      <div class="report-slider">
        <div class="report-track">
          <div class="report-slide"><img src="report1_1.png" alt=""></div>
          <div class="report-slide"><img src="report1_2.png" alt=""></div>
          <div class="report-slide"><img src="report1_3.png" alt=""></div>
        </div>
        <div class="report-dots">
          <button class="report-dot active"></button>
          <button class="report-dot"></button>
          <button class="report-dot"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- TYPE2 -->
  <div class="type-block">
    <img src="09_type2@3x.png" alt="">
    <div class="report-base">
      <img src="10_type2@3x.png" alt="">
      <div class="report-slider">
        <div class="report-track">
          <div class="report-slide"><img src="report2_1.png" alt=""></div>
          <div class="report-slide"><img src="report2_2.png" alt=""></div>
          <div class="report-slide"><img src="report2_3.png" alt=""></div>
        </div>
        <div class="report-dots">
          <button class="report-dot active"></button>
          <button class="report-dot"></button>
          <button class="report-dot"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- TYPE3 -->
  <div class="type-block">
    <img src="11_type3@3x.png" alt="">
    <div class="report-base">
      <img src="12_type3@3x.png" alt="">
      <div class="report-slider">
        <div class="report-track">
          <div class="report-slide"><img src="report3_1.png" alt=""></div>
          <div class="report-slide"><img src="report3_2.png" alt=""></div>
          <div class="report-slide"><img src="report3_3.png" alt=""></div>
        </div>
        <div class="report-dots">
          <button class="report-dot active"></button>
          <button class="report-dot"></button>
          <button class="report-dot"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- TYPE4 -->
  <div class="type-block">
    <img src="13_type4@3x.png" alt="">
    <div class="report-base">
      <img src="14_type5@3x.png" alt="">
      <div class="report-slider">
        <div class="report-track">
          <div class="report-slide"><img src="report4_1.png" alt=""></div>
          <div class="report-slide"><img src="report4_2.png" alt=""></div>
          <div class="report-slide"><img src="report4_3.png" alt=""></div>
        </div>
        <div class="report-dots">
          <button class="report-dot active"></button>
          <button class="report-dot"></button>
          <button class="report-dot"></button>
        </div>
      </div>
    </div>
  </div>

  <img src="アセット 5@3x.png" class="banner-spacing" alt="">
  <img src="アセット 6@3x.png" alt="">
  <img src="15_owari@3x.png" alt="">
</div>

<script>
document.querySelectorAll('.report-slider').forEach((slider)=>{
  const track=slider.querySelector('.report-track')
  const dots=slider.querySelectorAll('.report-dot')
  let current=0

  function update(index){
    track.style.transform=`translateX(-${index*100}%)`
    dots.forEach((dot,i)=>dot.classList.toggle('active',i===index))
    current=index
  }

  dots.forEach((dot,index)=>{
    dot.addEventListener('click',()=>update(index))
  })

  let startX=0

  slider.addEventListener('touchstart',(e)=>{
    startX=e.touches[0].clientX
  })

  slider.addEventListener('touchend',(e)=>{
    const diff=startX-e.changedTouches[0].clientX
    if(diff>40 && current<dots.length-1) update(current+1)
    if(diff<-40 && current>0) update(current-1)
  })
})
</script>
</body>
</html>
