<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カラーレンズLPポートフォリオ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #b0d0e5;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .wrapper {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      overflow: hidden;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    a {
      text-decoration: none;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
    }

    .buy-button {
      display: block;
      width: 90%;
      margin: 24px auto;
      transition: transform 0.3s ease, opacity 0.3s ease;
      cursor: pointer;
    }

    .buy-button:hover {
      transform: scale(1.02);
      opacity: 0.92;
    }

    /* 4系統画像 */
    .type-grid-section {
      padding: 12px 16px 24px;
      background: #fff;
    }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .type-grid img {
      width: 100%;
      display: block;
      border-radius: 4px;
    }

    /* レポスライダー */
    .report-slider {
      position: relative;
      width: calc(100% - 64px);
      margin: -235px auto 88px;
      overflow: hidden;
    }

    .report-track {
      display: flex;
      transition: transform 0.35s ease;
    }

    .report-slide {
      min-width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #ece8e2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .report-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .report-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }

    .report-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: none;
      background: rgba(70, 70, 70, 0.35);
      padding: 0;
      cursor: pointer;
    }

    .report-dot.active {
      background: rgba(70, 70, 70, 0.9);
    }

    .type-block {
      position: relative;
    }

    .type-block .report-slider {
      margin-top: -238px;
      margin-bottom: 86px;
    }

    /* ここ追加：アセット5の下余白32px */
    .banner-spacing {
      margin-bottom: 32px;
    }

    @media (max-width: 430px) {
      .report-slider {
        width: calc(100% - 48px);
      }

      .type-grid-section {
        padding: 10px 12px 20px;
      }

      .type-grid {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- ヘッダー -->
    <div class="sticky-header">
      <img src="new@3x.png" alt="ヘッダー" />
    </div>

    <img src="01_TOP@3x.png" alt="トップ画像" />
    <img src="02_sindan@3x.png" alt="診断セクション" />

    <!-- 4系統 -->
    <section class="type-grid-section">
      <div class="type-grid">
        <img src="03_kankoku@3x.png" alt="韓国モノトーン系" />
        <img src="04_girl@3x.png" alt="令和ギャル系" />
        <img src="05_amame@3x.png" alt="甘めアイドル系" />
        <img src="06_hakanage@3x.png" alt="儚げ清楚系" />
      </div>
    </section>

    <!-- Type 1 -->
    <div class="type-block">
      <img src="07_type1@3x.png" alt="タイプ1 前半" />
      <img src="08_type1@3x.png" alt="タイプ1 後半" />
      <div class="report-slider">
        <div class="report-track">
          <div class="report-slide"><img src="report1_1.png" alt=""></div>
          <div class="report-slide"><img src="report1_2.png" alt=""></div>
          <div class="report-slide"><img src="report1_3.png" alt=""></div>
        </div>
        <div class="report-dots">
          <button class="report-dot active"></button>
          <button class="report-dot"></button>
          <button class="report-dot"></button>
        </div>
      </div>
    </div>

    <a href="#" class="buy-button">
      <img src="アセット 4@3x.png" alt="購入">
    </a>

    <!-- Type 2 -->
    <div class="type-block">
      <img src="09_type2@3x.png" alt="タイプ2 前半" />
      <img src="10_type2@3x.png" alt="タイプ2 後半" />
      <div class="report-slider">
        <div class="report-track">
          <div class="report-slide"><img src="report2_1.png" alt=""></div>
          <div class="report-slide"><img src="report2_2.png" alt=""></div>
          <div class="report-slide"><img src="report2_3.png" alt=""></div>
        </div>
        <div class="report-dots">
          <button class="report-dot active"></button>
          <button class="report-dot"></button>
          <button class="report-dot"></button>
        </div>
      </div>
    </div>

    <a href="#" class="buy-button">
      <img src="アセット 4@3x.png" alt="購入">
    </a>

    <!-- Type 3 -->
    <div class="type-block">
      <img src="11_type3@3x.png" alt="タイプ3 前半" />
      <img src="12_type3@3x.png" alt="タイプ3 後半" />
      <div class="report-slider">
        <div class="report-track">
          <div class="report-slide"><img src="report3_1.png" alt=""></div>
          <div class="report-slide"><img src="report3_2.png" alt=""></div>
          <div class="report-slide"><img src="report3_3.png" alt=""></div>
        </div>
        <div class="report-dots">
          <button class="report-dot active"></button>
          <button class="report-dot"></button>
          <button class="report-dot"></button>
        </div>
      </div>
    </div>

    <a href="#" class="buy-button">
      <img src="アセット 4@3x.png" alt="購入">
    </a>

    <!-- Type 4 -->
    <div class="type-block">
      <img src="13_type4@3x.png" alt="タイプ4 前半" />
      <img src="14_type5@3x.png" alt="タイプ4 後半" />
      <div class="report-slider">
        <div class="report-track">
          <div class="report-slide"><img src="report4_1.png" alt=""></div>
          <div class="report-slide"><img src="report4_2.png" alt=""></div>
          <div class="report-slide"><img src="report4_3.png" alt=""></div>
        </div>
        <div class="report-dots">
          <button class="report-dot active"></button>
          <button class="report-dot"></button>
          <button class="report-dot"></button>
        </div>
      </div>
    </div>

    <a href="#" class="buy-button">
      <img src="アセット 4@3x.png" alt="購入">
    </a>

    <!-- ここだけ class追加 -->
    <img src="アセット 5@3x.png" alt="バナー" class="banner-spacing" />

    <img src="アセット 6@3x.png" alt="キャンペーン" />
    <img src="15_owari@3x.png" alt="フッター" />

  </div>

  <script>
    const sliders = document.querySelectorAll('.report-slider');

    sliders.forEach((slider) => {
      const track = slider.querySelector('.report-track');
      const dots = slider.querySelectorAll('.report-dot');
      const slideCount = dots.length;
      let current = 0;

      function updateSlider(index) {
        track.style.transform = `translateX(-${index * 100}%)`;

        dots.forEach((dot, i) => {
          dot.classList.toggle('active', i === index);
        });

        current = index;
      }

      dots.forEach((dot, index) => {
        dot.addEventListener('click', () => {
          updateSlider(index);
        });
      });

      let startX = 0;

      slider.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
      });

      slider.addEventListener('touchend', (e) => {
        const endX = e.changedTouches[0].clientX;
        const diff = startX - endX;

        if (diff > 40 && current < slideCount - 1) {
          updateSlider(current + 1);
        } else if (diff < -40 && current > 0) {
          updateSlider(current - 1);
        }
      });
    });
  </script>
</body>
</html>
