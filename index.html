<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カラコンLP ポートフォリオ</title>
  <style>
    body {
      margin: 0;
      background: #b0d0e5;
      font-family: sans-serif;
    }

    .wrapper {
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
    }

    img {
      width: 100%;
      display: block;
    }

    .buy-button {
      display: block;
      width: 90%;
      margin: 24px auto;
      transition: 0.3s;
      cursor: pointer;
    }

    .buy-button:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .site-header {
      width: 100%;
      display: block;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: white;
    }

    @media screen and (min-width: 768px) {
      body {
        background: #b0d0e5;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <!-- ヘッダー -->
    <div class="sticky-header">
      <img src="assets/アートボード 2@3x.png" alt="header" class="site-header">
    </div>

    <!-- TOP -->
    <img src="assets/01_TOP@3x.png" alt="">
    <img src="assets/02_sindan@3x.png" alt="">
    <img src="assets/03_kankoku@3x.png" alt="">
    <img src="assets/04_reiwa@3x.png" alt="">
    <img src="assets/05_amame@3x.png" alt="">
    <img src="assets/06_hakanage@3x.png" alt="">

    <!-- Type 1 -->
    <img src="assets/07_type1@3x.png" alt="">
    <img src="assets/08_type1@3x.png" alt="">

    <a href="#" class="buy-button">
      <img src="assets/アセット 4@3x.png" alt="購入">
    </a>

    <!-- Type 2 -->
    <img src="assets/09_type2@3x.png" alt="">
    <img src="assets/10_type2@3x.png" alt="">

    <a href="#" class="buy-button">
      <img src="assets/アセット 4@3x.png" alt="購入">
    </a>

    <!-- Type 3 -->
    <img src="assets/11_type3@3x.png" alt="">
    <img src="assets/12_type3@3x.png" alt="">

    <a href="#" class="buy-button">
      <img src="assets/アセット 4@3x.png" alt="購入">
    </a>

    <!-- Type 4 -->
    <img src="assets/13_type4@3x.png" alt="">
    <img src="assets/14_type5@3x.png" alt="">

    <a href="#" class="buy-button">
      <img src="assets/アセット 4@3x.png" alt="購入">
    </a>

    <!-- CTA -->
    <img src="assets/アセット 5@3x.png" alt="">
    <img src="assets/アセット 6@3x.png" alt="">
    <img src="assets/15_owari@3x.png" alt="">

  </div>

</body>
</html>
